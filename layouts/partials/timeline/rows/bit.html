<div class="mx-auto flex max-w-2xl items-start gap-3 px-2 py-2">
  <div
    class="bg-{{ .colour }}-50 text-{{ .colour }}-600 flex h-6 w-6 shrink-0 items-center justify-center rounded-full ring-4 ring-white"
  >
    {{ partial "icon.html" (dict "pack" .pack "icon" .icon "class" "text-[10px]") }}
  </div>
  <div class="min-w-0 flex-1">
    <div class="flex items-center gap-2">
      <span
        class="bg-{{ .colour }}-50 text-{{ .colour }}-600 rounded px-1.5 py-0.5 text-[11px] font-medium"
        >{{ .label }}</span
      >
      <span class="text-xs text-slate-400"
        >{{ partial "functions/relative-date.html" .date }}</span
      >
    </div>
    <div class="mt-0.5 truncate text-sm text-slate-600">
      <a href="{{ .url }}" class="hover:text-slate-800">{{ .title }}</a>
    </div>
  </div>
</div>
